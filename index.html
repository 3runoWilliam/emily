<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Te Amo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background: 
        linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
        url('fundo1.jpeg') no-repeat center center/cover;
    
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .content {
      position: relative;
      text-align: center;
      color: white;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="content">
    <h1>TE AMO, EMILY ❤️</h1>
    <p>
      Eu te amo e escolho te amar todos os dias. 
      Obrigado por viver cada momento comigo e fazer todos os dias especiais.
    </p>
  </div>

  <audio id="musica" autoplay loop playsinline muted>
    <source src="anavitoria.mp3" type="audio/mpeg">
  </audio>
  
  <script>
    const audio = document.getElementById('musica');
  
    function ativarAudio() {
      audio.muted = false;
      audio.volume = 0.3;
      audio.play();
  
      // remove depois de ativar uma vez
      document.removeEventListener('touchstart', ativarAudio);
    }
  
    document.addEventListener('touchstart', ativarAudio);
  </script>
  
</body>
</html>
