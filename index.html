<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Te Amo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background: url('fundo.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      text-align: center;
      color: white;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="content">
    <h1>te amo, emily ❤️</h1>
    <p>
      Amor é encontrar em alguém um lar, mesmo longe de casa.<br>
      É sentir paz no abraço e alegria no simples existir juntos.<br><br>
      Você é tudo pra mim.
    </p>
  </div>

</body>
</html>
